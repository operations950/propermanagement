{% extends 'base.html' %}
{% load static %}
{% block title %}Log in — Proper Management{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4 mt-5 text-center">
        <img src="{% static 'img/proper-realty-logo.png' %}" alt="Proper Realty" style="height: 44px;" class="mb-4">
        <div class="card" style="border-radius: var(--bs-border-radius-xl);">
            <div class="card-body p-4">
                <h3 class="page-title mb-3" style="color: var(--ink-primary);">Staff login</h3>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button class="btn btn-primary w-100" type="submit">Log in</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
