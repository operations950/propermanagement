<form method="post" action="{% url 'ticket_set_assignee' t.pk %}">
    {% csrf_token %}
    <input type="hidden" name="next_qs" value="{{ request.GET.urlencode }}">
    <span data-inline-edit>
        <span data-inline-edit-display>{{ t.assignee_label }}</span>
        <button type="button" data-inline-edit-toggle class="btn btn-link btn-sm p-0 ms-1"><i data-lucide="pencil" class="icon"></i></button>
        <div data-inline-edit-picker hidden>
            <div class="bubble-picker mb-0" data-bubble-picker data-mode="single" data-name="assignee">
                <input type="hidden" name="assignee" data-bubble-input value="{% if t.assigned_staff_id %}staff-{{ t.assigned_staff_id }}{% elif t.assigned_contact_id %}contact-{{ t.assigned_contact_id }}{% endif %}">
                <div class="bubble-slot" data-bubble-slot data-empty-text="Unassigned"></div>
                <div class="small text-muted mb-1">Staff</div>
                <div class="bubble-pool mb-2" data-bubble-pool>
                    {% for s in staff_list %}
                        <button type="button" class="bubble" data-value="staff-{{ s.pk }}" data-label="{{ s }}">{{ s }}</button>
                    {% endfor %}
                </div>
                <div class="small text-muted mb-1">Vendors</div>
                <div class="bubble-pool" data-bubble-pool>
                    {% for v in vendor_list %}
                        <button type="button" class="bubble" data-value="contact-{{ v.pk }}" data-label="{{ v.name }}">{{ v.name }}</button>
                    {% endfor %}
                </div>
            </div>
        </div>
    </span>
</form>
