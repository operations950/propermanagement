{% load ticket_extras %}
<form method="post" action="{% url 'ticket_set_department' t.pk %}">
    {% csrf_token %}
    <input type="hidden" name="next_qs" value="{{ request.GET.urlencode }}">
    <span data-inline-edit>
        <span data-inline-edit-display>
            <span class="badge" style="{{ t.assigned_role|department_badge_style }}">{{ t.get_assigned_role_display|default:'Unassigned' }}</span>
        </span>
        <button type="button" data-inline-edit-toggle class="btn btn-link btn-sm p-0 ms-1"><i data-lucide="pencil" class="icon"></i></button>
        <div data-inline-edit-picker hidden>
            <div class="bubble-picker mb-0" data-bubble-picker data-mode="single" data-name="assigned_role">
                <input type="hidden" name="assigned_role" data-bubble-input value="{{ t.assigned_role }}">
                <div class="bubble-slot" data-bubble-slot data-empty-text="Unassigned"></div>
                <div class="bubble-pool" data-bubble-pool>
                    {% for value, label in role_choices %}
                        <button type="button" class="bubble" data-value="{{ value }}" data-label="{{ label }}" style="--bubble-color: var(--role-{{ value }});">
                            <i data-lucide="{{ value|department_icon }}" class="icon"></i> {{ label }}
                        </button>
                    {% endfor %}
                </div>
            </div>
        </div>
    </span>
</form>
