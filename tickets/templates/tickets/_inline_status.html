<form method="post" action="{% url 'ticket_set_status' t.pk %}">
    {% csrf_token %}
    <input type="hidden" name="next_qs" value="{{ request.GET.urlencode }}">
    <span data-inline-edit>
        <span data-inline-edit-display>
            <span class="badge rounded-pill bg-{% if t.status == 'cancelled' %}secondary{% elif t.status == 'completed' or t.status == 'verified' %}success{% elif t.priority == 'urgent' %}danger{% else %}primary{% endif %}">{{ t.get_status_display }}</span>
        </span>
        <button type="button" data-inline-edit-toggle class="btn btn-link btn-sm p-0 ms-1"><i data-lucide="pencil" class="icon"></i></button>
        <div data-inline-edit-picker hidden>
            <div class="bubble-picker mb-0" data-bubble-picker data-mode="single" data-name="status">
                <input type="hidden" name="status" data-bubble-input value="{{ t.status }}">
                <div class="bubble-slot" data-bubble-slot data-empty-text="Choose a status"></div>
                <div class="bubble-pool" data-bubble-pool>
                    {% for value, label in status_choices %}
                        <button type="button" class="bubble" data-value="{{ value }}" data-label="{{ label }}">{{ label }}</button>
                    {% endfor %}
                </div>
            </div>
        </div>
    </span>
</form>
