{% extends 'base.html' %}
{% block title %}New ticket{% endblock %}
{% block content %}
<a href="{% url 'ticket_list' %}" class="text-decoration-none small d-inline-flex align-items-center gap-1 mt-3" style="color: var(--ink-muted);"><i data-lucide="arrow-left" class="icon"></i> All tickets</a>
<h2 class="page-title mb-3">New ticket</h2>
<div class="card" style="max-width: 640px;">
    <div class="card-body p-4">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn btn-primary" type="submit"><i data-lucide="plus" class="icon"></i> Create ticket</button>
        </form>
    </div>
</div>
{% endblock %}
