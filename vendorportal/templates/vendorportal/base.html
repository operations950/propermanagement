{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Job update — Proper Management{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #efedf3; color: #404040; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
        .btn-primary { background-color: #6e95b2; border-color: #6e95b2; }
        .btn-primary:hover { background-color: #64768a; border-color: #64768a; }
        a { color: #6e95b2; }
    </style>
</head>
<body>
    <div class="container">
        <div class="text-center my-4">
            <img src="{% static 'img/proper-realty-logo.png' %}" alt="Proper Realty" style="height: 36px;">
        </div>
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags|default:'info' }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
