{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Job update — Proper Management{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Serif:wght@500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        :root {
            --brand-primary: #6e95b2;
            --brand-slate: #64768a;
            --brand-surface: #efedf3;
            --brand-ink: #2b2b2e;
            --border-hairline: rgba(43, 43, 46, 0.10);
            --shadow-card: 0 1px 2px rgba(43, 43, 46, 0.04), 0 6px 20px rgba(43, 43, 46, 0.06);

            --bs-border-radius: 12px;
            --bs-border-radius-lg: 18px;
            --bs-border-radius-xl: 22px;
        }
        body {
            background: var(--brand-surface);
            color: var(--brand-ink);
            font-family: 'Inter', system-ui, -apple-system, "Segoe UI", sans-serif;
        }
        .page-title { font-family: 'IBM Plex Serif', Georgia, serif; font-weight: 600; letter-spacing: -0.01em; }
        .btn { font-weight: 500; }
        .btn-primary { background-color: var(--brand-primary); border-color: var(--brand-primary); }
        .btn-primary:hover { background-color: var(--brand-slate); border-color: var(--brand-slate); }
        a { color: var(--brand-primary); }
        .card { border: 1px solid var(--border-hairline); box-shadow: var(--shadow-card); border-radius: var(--bs-border-radius-lg); }
        .icon { width: 1em; height: 1em; stroke-width: 2; vertical-align: -0.15em; }
        .icon-lg { width: 1.6em; height: 1.6em; stroke-width: 1.75; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 720px;">
        <div class="text-center my-4">
            <img src="{% static 'img/proper-realty-logo.png' %}" alt="Proper Realty" style="height: 36px;">
        </div>
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags|default:'info' }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
